name: CI — Lint & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend — Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: |
          echo "🔍 Checking for syntax errors..."
          node --check src/app.js
          node --check src/services/ragService.js
          node --check src/services/vectorService.js
          node --check src/services/chunkService.js

  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: http://localhost:5000

  eval-harness:
    name: Eval — Validate query corpus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate queries.json
        run: |
          node -e "
            const q = require('./backend/eval/queries.json');
            console.log('Queries loaded:', q.length);
            if (q.length < 65) process.exit(1);
            const hasRequired = q.every(x => x.id && x.query && x.expectedKeywords && x.category);
            if (!hasRequired) process.exit(1);
            console.log('All queries valid ✅');
          "
